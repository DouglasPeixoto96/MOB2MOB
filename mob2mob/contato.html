<body>
    <h2 class="contato_titulo">Envio sua Dúvida ou Solicite um Orçamento.</h2>

<form id="meuFormulario" action="mailto:contato@mob2mob.com.br" method="post">
    <label for="Nome">Nome:</label><br>
    <input type="text" id="nome" name="Nome" required><br><br>

    <label for="E-mail">E-mail:</label><br>
    <input type="email" id="email" name="E-mail" required><br><br>

    <label for="Telefone">Telefone:</label><br>
    <input type="tel" id="telefone" name="Telefone" required><br><br>

    <label for="Mensagem">Mensagem:</label><br>
    <textarea id="Mensagem" name="Mensagem" rows="4" required></textarea><br><br>  

    <input type="submit" value="Enviar">
</form>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('meuFormulario').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita o envio padrão do formulário

            // Obtém os dados do formulário
            var formData = new FormData(this);

            // Obtém o valor do campo de nome
            var nome = formData.get('Nome');

            // Define o assunto do e-mail
            var assunto = 'Dúvidas ou Orçamento - ' + nome;

            // Processa os dados do formulário para formatar o corpo do e-mail
            var corpoEmail = '';
            formData.forEach(function(value, key) {
                corpoEmail += key + ': ' + value + '\n';
            });

            // Cria um link de e-mail com o corpo formatado
            var linkEmail = 'mailto:contato@mob2mob.com.br?body=' + encodeURIComponent(corpoEmail);

            // Abre o link de e-mail em uma nova janela
            window.open(linkEmail, '_blank');
        });
    });
</script>
    
</body>
